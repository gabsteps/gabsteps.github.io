theme = "PaperMod"

title = "Gabriel Passos"
baseURL = "https://gabrielpassos.com/"
defaultContentLanguage = "en"
locale = "en"

[params]
  env = "production"
  author = "Gabriel S Passos"
  description = "Cybersecurity portfolio of Gabriel Passos, a defender in the making focused on SOC analysis, Blue Team operations, incident response, threat detection, and hands-on security projects."
  keywords = ["SOC Analyst", "Blue Team", "Cybersecurity Portfolio", "SIEM", "Wazuh", "Homelab SOC", "CompTIA Security+", "OSINT", "Active Directory Security", "Incident Response", "Log Analysis", "Python Cybersecurity", "Hardening", "Threat Detection", "Vulnerability Management", "Security Operations Center"]
  images = ["images/profile.png"]
  defaultTheme = "dark"
  disableThemeToggle = true
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
    
[params.assets]
  favicon = "icons/favicon.ico"
  favicon16x16 = "icons/favicon-16x16.png"
  favicon32x32 = "icons/favicon-32x32.png"
  apple_touch_icon = "icons/apple-touch-icon.png"	
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[menus]
  [[menus.main]]
    name = 'Home'
    pageRef = '/'
    weight = 10
  [[menus.main]]
    name = 'About'
    pageRef = '/about/'
    weight = 20
  [[menus.main]]
    name = 'Articles'
    pageRef = '/articles/'
    weight = 30
  [[menus.main]]
    name = 'My Projects'
    pageRef = '/projects/'
    weight = 40
  [[menus.main]]
    name = 'Contact'
    pageRef = '/contact/'
    weight = 50
