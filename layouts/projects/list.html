{{ define "main" }}
<div class="projects-grid">

  {{ range .Pages }}
  <div class="project-card">

    {{ if .Params.image }}
      <img src="{{ .Params.image }}" alt="{{ .Title }}">
    {{ end }}

    <h3>{{ .Title }}</h3>

    {{ if .Params.tags }}
    <div class="project-tags">
      {{ range .Params.tags }}
        <a class="project-tag" href="/tags/{{ . | urlize }}">
          {{ . }}
        </a>
      {{ end }}
    </div>
    {{ end }}

    <p class="project-description">
      {{ .Params.description }}
    </p>

    <a class="project-btn" href="{{ .RelPermalink }}">
      Read more →
    </a>

  </div>
  {{ end }}

</div>
{{ end }}
